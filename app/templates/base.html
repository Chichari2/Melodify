<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melodify - Your Music</title>

    <!-- Link to stylesheets -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/responsive.css') }}">

    {% block head %}{% endblock %}
</head>
<body>

    <!-- Header Section -->
    <header>
        <nav>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/features">Features</a></li>
                <li><a href="/pricing">Pricing</a></li>
                <li><a href="/contact">Contact</a></li>
                {% if not current_user.is_authenticated %}
                    <li id="auth-buttons">
                        <button onclick="window.location.href='/login'">Login</button>
                        <button onclick="window.location.href='/register'">Register</button>
                    </li>
                {% else %}
                    <li class="dropdown">
                        <button class="dropbtn">{{ current_user.username }}</button>
                        <div class="dropdown-content">
                            <a href="#">Profile</a>
                            <a href="/logout">Logout</a>
                        </div>
                    </li>
                {% endif %}
            </ul>

            <!-- Dark Mode Button in the Top Right Corner -->
            <div id="theme-toggle" class="theme-toggle">
                <button onclick="toggleTheme()">🌙</button> <!-- Emoji for light/dark mode -->
            </div>
        </nav>
    </header>

    <!-- Main Content Section -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2025 Melodify. All rights reserved.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
